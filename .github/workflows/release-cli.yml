name: Release CLI

on:
  push:
    tags:
      - "v*"  # Déclenché uniquement sur les tags ex: v1.0.0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tipiak-cli

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tipiak-cli

          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            binary: tipiak-cli

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tipiak-cli

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tipiak-cli

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: tipiak-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu

      - name: Configure linker (ARM)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << EOF
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"

          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} --package tipiak-cli

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/tipiak-cli-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tipiak-cli-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true